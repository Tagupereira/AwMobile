<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <meta name="description" content="TD desenvolvimento digital" />
  <meta name="theme-color" content="#060e20">

  <title>SoundFlow PRO - Team Management</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-surface-variant": "#a3aac4",
            "inverse-primary": "#0053dc",
            "surface-container": "#0f1930",
            "secondary-dim": "#58e7ab",
            "on-primary-container": "#001e5a",
            "on-tertiary-fixed-variant": "#79000e",
            "tertiary-fixed-dim": "#ff7b74",
            "outline-variant": "#40485d",
            "error-container": "#9f0519",
            "on-background": "#dee5ff",
            "on-secondary": "#005a3c",
            "secondary-fixed-dim": "#58e7ab",
            "inverse-on-surface": "#4d556b",
            "error": "#ff716c",
            "background": "#060e20",
            "secondary": "#69f6b8",
            "tertiary-dim": "#ff716a",
            "primary-fixed-dim": "#658eff",
            "on-primary": "#002873",
            "tertiary-container": "#fd4e4d",
            "tertiary-fixed": "#ff928b",
            "on-tertiary-fixed": "#3a0003",
            "on-tertiary-container": "#1f0001",
            "surface-container-highest": "#192540",
            "surface-dim": "#060e20",
            "on-tertiary": "#490005",
            "on-secondary-fixed-variant": "#006544",
            "secondary-fixed": "#69f6b8",
            "outline": "#6d758c",
            "on-primary-fixed-variant": "#00266e",
            "surface-container-high": "#141f38",
            "primary-fixed": "#7b9cff",
            "on-error-container": "#ffa8a3",
            "on-primary-fixed": "#000000",
            "surface": "#060e20",
            "surface-container-low": "#091328",
            "surface-bright": "#1f2b49",
            "surface-container-lowest": "#000000",
            "primary-dim": "#316bf3",
            "on-secondary-fixed": "#00452d",
            "primary-container": "#7b9cff",
            "surface-tint": "#90abff",
            "error-dim": "#d7383b",
            "on-error": "#490006",
            "tertiary": "#ff716a",
            "on-secondary-container": "#e1ffec",
            "on-surface": "#dee5ff",
            "inverse-surface": "#faf8ff",
            "secondary-container": "#006c49",
            "surface-variant": "#192540",
            "primary": "#90abff"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": [
              "Manrope"
            ],
            "body": [
              "Inter"
            ],
            "label": [
              "Inter"
            ]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #0b0c10;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="font-body text-on-surface antialiased">
  <!-- TopAppBar -->
  <header class="bg-[#0f1219] w-full top-0 sticky z-50 flex justify-between items-center px-6 py-4 w-full">
    <div class="flex items-center gap-3">

      <span id="back"
        class="material-symbols-outlined text-[#dee5ff] active:scale-95 duration-200 cursor-pointer">arrow_back</span>

      <h1 id="namePage" class="font-['Manrope'] font-bold tracking-tight text-1xl text-[#dee5ff]"></h1>
    </div>

  </header>
  <main class=" teamList pt-5 pb-32 px-6 max-w-5xl mx-auto">
  <section class="bg-surface-container
rounded-3xl
p-6
border border-white/5
mb-6">

    <div class="flex items-center gap-4">

      <div class="relative">

        <img class="w-20 h-20 rounded-2xl object-cover" src="https://i.pravatar.cc/300">

        <div id="ledStatus" class="absolute bottom-0 right-0
      w-5 h-5 rounded-full
      bg-secondary border-4 border-surface">
        </div>

      </div>

      <div>

        <h1 id="nameUser" class="text-2xl font-bold"></h1>

        <p id="tipo" class="text-on-surface-variant">
          Administrador
        </p>

        <div id="status" class="mt-2 inline-flex
      px-3 py-1 rounded-full text-xs uppercase tracking-widest">

          Online

        </div>

      </div>

    </div>

  </section>

  <section class="grid grid-cols-3 gap-3 mb-6">

    <!-- EDIT -->
    <button class="bg-primary/10
  text-primary
  rounded-2xl
  p-4
  flex flex-col items-center gap-2
  active:scale-95">

      <span class="material-symbols-outlined">
        edit
      </span>

      <span class="text-xs uppercase">
        Editar
      </span>

    </button>

    <!-- DESATIVAR -->
    <button class="bg-yellow-500/10
  text-yellow-400
  rounded-2xl
  p-4
  flex flex-col items-center gap-2
  active:scale-95">

      <span class="material-symbols-outlined">
        block
      </span>

      <span class="text-xs uppercase">
        Desativar
      </span>

    </button>

    <!-- DELETE -->
    <button class="bg-error/10
  text-error
  rounded-2xl
  p-4
  flex flex-col items-center gap-2
  active:scale-95">

      <span class="material-symbols-outlined">
        delete
      </span>

      <span class="text-xs uppercase">
        Excluir
      </span>

    </button>

  </section>

  <section class="grid grid-cols-3 gap-3 mb-6">

    <div class="bg-surface-container rounded-2xl p-4">

      <p class="text-xs text-on-surface-variant">
        Logs
      </p>

      <h2 id="contagemLog" class="text-2xl font-bold">
        
      </h2>

    </div>

  </section>

  <section class="space-y-4">

    <h2 class="text-lg font-bold text-primary">
      Histórico de ações
    </h2>

    <!-- LOG ITEM -->
    <div id="mainLogs" class="mainLogs">

    </div>

  </section>
  </main>
  <script type="module" src="js/detailUser.js"></script>
</body>

</html>
