<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background-color: #060e20; }
  </style>

  <title>Login</title>
</head>

<body class="flex p-10 justify-center min-h-screen text-white px-4">

  <div class="bg-[#0f1930] p-8 rounded-2xl w-full max-w-sm shadow-2xl">

    <!-- LOGO -->
    <div class="flex justify-center items-center h-[150px] mb-6">
      <img src="logo.png"
        class="w-[150px] object-cover rounded-full border border-[#6d758c]/20 bg-[#091328] p-2">
    </div>

    <h1 class="text-2xl font-bold text-center mb-6">Login</h1>

    <input id="email" type="email" placeholder="Email"
      class="w-full mb-4 p-3 rounded-xl bg-[#091328] outline-none">

    <input id="senha" type="password" placeholder="Senha"
      class="w-full mb-6 p-3 rounded-xl bg-[#091328] outline-none">

    <button onclick="login()"
      class="w-full bg-blue-600 p-3 rounded-xl font-bold">
      Entrar
    </button>

    <p id="erro" class="text-red-400 text-sm mt-4 text-center"></p>

  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const erro = document.getElementById('erro');

      erro.innerText = "";

      try {
        const res = await fetch(
          `https://uxxcdfwndahyuefupsds.supabase.co/rest/v1/acesso?user=eq.${email}&password=eq.${senha}`,
          {
            headers: {
              "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4eGNkZnduZGFoeXVlZnVwc2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDg4NzYsImV4cCI6MjA5MzQyNDg3Nn0.YbgoHHOeAvmtNJRtrCIYhG33c5IRwP7DWNwXn4QxkWU",
              "Authorization": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4eGNkZnduZGFoeXVlZnVwc2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDg4NzYsImV4cCI6MjA5MzQyNDg3Nn0.YbgoHHOeAvmtNJRtrCIYhG33c5IRwP7DWNwXn4QxkWU "
            }
          }
        );

        const data = await res.json();

        if (data.length > 0) {
          // LOGIN OK → só redireciona
          window.location.href = "inicio.html";
        } else {
          erro.innerText = "Email ou senha inválidos";
        }

      } catch (e) {
        erro.innerText = "Erro ao conectar";
      }
    }
  </script>

</body>
</html>
