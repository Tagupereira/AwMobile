<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
   <meta name="theme-color" content="#060e20" >
  <meta name="description" content="TD desenvolvimento digital" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="css/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "background": "#060e20",
            "secondary-fixed": "#69f6b8",
            "on-primary-container": "#001e5a",
            "on-secondary-fixed": "#00452d",
            "surface-bright": "#1f2b49",
            "surface-container-high": "#141f38",
            "error-container": "#9f0519",
            "inverse-primary": "#0053dc",
            "inverse-on-surface": "#4d556b",
            "tertiary-container": "#fd4e4d",
            "on-surface": "#dee5ff",
            "tertiary-fixed-dim": "#ff7b74",
            "surface-variant": "#192540",
            "surface-tint": "#90abff",
            "error-dim": "#d7383b",
            "primary-fixed-dim": "#658eff",
            "on-primary": "#002873",
            "on-tertiary-fixed": "#3a0003",
            "primary-fixed": "#7b9cff",
            "secondary-fixed-dim": "#58e7ab",
            "surface-container-low": "#091328",
            "outline": "#6d758c",
            "surface-container": "#0f1930",
            "on-secondary": "#005a3c",
            "on-secondary-fixed-variant": "#006544",
            "on-background": "#dee5ff",
            "on-surface-variant": "#a3aac4",
            "on-primary-fixed-variant": "#00266e",
            "on-tertiary-container": "#1f0001",
            "on-error-container": "#ffa8a3",
            "secondary": "#69f6b8",
            "error": "#ff716c",
            "surface": "#060e20",
            "on-secondary-container": "#e1ffec",
            "surface-dim": "#060e20",
            "surface-container-lowest": "#000000",
            "on-primary-fixed": "#000000",
            "outline-variant": "#40485d",
            "surface-container-highest": "#192540",
            "tertiary-dim": "#ff716a",
            "inverse-surface": "#faf8ff",
            "primary-dim": "#316bf3",
            "tertiary": "#ff716a",
            "on-tertiary": "#490005",
            "secondary-dim": "#58e7ab",
            "secondary-container": "#006c49",
            "on-error": "#490006",
            "primary-container": "#7b9cff",
            "on-tertiary-fixed-variant": "#79000e",
            "primary": "#90abff",
            "tertiary-fixed": "#ff928b"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #0b0c10;
      color: #dee5ff;
      font-family: 'Inter', sans-serif;
    }

    .glass-nav {
      background: rgba(6, 14, 32, 0.7);
      backdrop-filter: blur(20px);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="flex flex-col min-h-screen">
  <!-- TopAppBar -->
  <header class="bg-[#0f1219] w-full top-0 sticky z-50 flex justify-between items-center px-6 py-4 w-full">
    <div class="flex items-center gap-3">

      <span id="back"
        class="material-symbols-outlined text-[#dee5ff] active:scale-95 duration-200 cursor-pointer">arrow_back</span>

      <h1 class="font-['Manrope'] font-bold tracking-tight text-1xl text-[#dee5ff]">Equipamentos</h1>
    </div>
    <button class="text-[#90abff] hover:bg-[#0f1930] transition-colors p-2 rounded-lg">
    </button>
  </header>
  <!-- Main Content Canvas -->
  <main class="flex-1 px-4 pt-4 pb-32 max-w-md mx-auto w-full">
    <!-- Search & Filter Section -->
    <section class="mb-8">
      <div class="relative group">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg"
          data-icon="search">search</span>
        <input id="search-input"
          class="w-full bg-[#0f1219] border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all font-body"
          placeholder="Buscar equipamentos..." type="text" />
      </div>
      <div class="flex gap-3 mt-4 overflow-x-auto pb-2 scrollbar-hidden">
        <button data-filtro=""
          class="buscaCategoria bg-[#0f1219] text-primary px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 whitespace-nowrap">
          <span class="material-symbols-outlined text-sm" data-icon="filter_list">filter_list</span> All Stock
        </button>
        <button data-filtro="funcionando"
          class="buscaCategoria bg-[#0f1219] text-on-surface-variant px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest whitespace-nowrap hover:bg-surface-container-high transition-colors">
          Funcionando
        </button>
        <button data-filtro="defeito"
          class="buscaCategoria bg-[#0f1219] text-on-surface-variant px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest whitespace-nowrap hover:bg-surface-container-high transition-colors">
          Defeito
        </button>
        <button data-filtro="manutencao"
          class="buscaCategoria bg-[#0f1219] text-on-surface-variant px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest whitespace-nowrap hover:bg-surface-container-high transition-colors">
          Manutencão
        </button>
        <button data-filtro="evento"
          class="buscaCategoria bg-[#0f1219] text-on-surface-variant px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest whitespace-nowrap hover:bg-surface-container-high transition-colors">
          Em Evento
        </button>
        <button data-filtro="locado"
          class="buscaCategoria bg-[#0f1219] text-on-surface-variant px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest whitespace-nowrap hover:bg-surface-container-high transition-colors">
          Locado
        </button>
        <button data-filtro="analise"
          class="buscaCategoria bg-[#0f1219] text-on-surface-variant px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest whitespace-nowrap hover:bg-surface-container-high transition-colors">
          Análise
        </button>
      </div>
    </section>
    <!-- Equipment Grid/List -->
    <div class="space-y-4" id="equipment-list"></div>
  </main>
  <button id="btn-topo"
    class="fixed bottom-6 right-6 bg-primary text-black p-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-all duration-300">
    <span class="material-symbols-outlined">arrow_upward</span>
  </button>
 
  <script type="module" src="js/view_equipment.js"></script>
</body>

</html>
