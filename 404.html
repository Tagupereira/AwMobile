<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060e20" >
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
  
  <title>Página não encontrada</title>
  <style>
    :root{
      --bg404: url('https://img.magnific.com/premium-vector/cactus-404-found-concepts-vector-illustration-landing-page_929545-602.jpg?w=1060');
    }
    *{
      margin: 0;
      padding:0;
      box-sizing: border-box;
    }
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:sans-serif;
      flex-direction:column;
      background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,1)), var(--bg404) ;
      background-position: center;
      background-repeat: no-repeat;
    
    }
    .bg{
      width: 100%;
      height: 100%;
      background-image: var(--bg404);
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      mix-blend-mode: multiply;
      
    }
    h1{
      margin:0;
    }
    button{
      width: 90%;
      height: 10%;
      font-size: 1.5rem;
      border-radius: 10px;
      margin:20px auto 60px;
      border: none;
      background-color: #3FC892;
      color: #fff;
      
    }
   
  </style>
</head>

<body>
  <div class="bg"></div>
  <button id="back404">

    Voltar

  </button>
  <script type="module">
    import { navegar } from "../js/router.js"
    const back404 = document.getElementById("back404");
    back404.addEventListener("click",()=>{
      navegar("back");
    })

  </script>

</body>
</html>
