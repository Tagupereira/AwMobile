<!DOCTYPE html>

<html class="dark" lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="TD desenvolvimento digital" />

    <title>SoundFlow PRO - Add Equipment</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="css/style.css">

                        "outline-variant": "#40485d",
                        "surface-container-lowest": "#000000",
                        "outline": "#6d758c",
                        "on-error": "#490006",
                        "secondary-fixed-dim": "#58e7ab",
                        "tertiary-fixed-dim": "#ff7b74",
                        "on-surface-variant": "#a3aac4",
                        "background": "#060e20",
                        "on-tertiary-container": "#1f0001",
                        "error-dim": "#d7383b",

                        "secondary-container": "#006c49",
                        "secondary": "#69f6b8",
                        "on-secondary-fixed": "#00452d",
                        "surface-container-high": "#141f38",
                        "tertiary-container": "#fd4e4d",
                        "surface-container": "#0f1930",
                        "surface-container-low": "#091328",
                        "on-primary-fixed": "#000000",
                        "on-tertiary": "#490005",
                        "on-surface": "#dee5ff",
                        "tertiary": "#ff716a",
                        "primary-dim": "#316bf3",
                        "error": "#ff716c",
                        "on-secondary-container": "#e1ffec",
                        "inverse-surface": "#faf8ff",
                        "on-tertiary-fixed-variant": "#79000e",
                        "primary": "#90abff",
                        "primary-container": "#7b9cff",
                        "on-tertiary-fixed": "#3a0003",
                        "on-background": "#dee5ff",
                        "surface": "#060e20",

                    "borderRadius": {

                        "lg": "0.5rem",

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #060e20;
        }

        ::-webkit-scrollbar-thumb {
            background: #1f2b49;
            border-radius: 10px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-[#0b0c10] text-on-surface font-body min-h-screen pb-10">
    <!-- Top Bar Component -->
    <header class="bg-[#0f1219] w-full top-0 sticky z-50 flex justify-between items-center px-6 py-4 w-full">
        <div class="flex items-center gap-3">

            <span class="backBtn material-symbols-outlined text-[#90abff] active:scale-95 duration-200 cursor-pointer"
                >arrow_back</span>

            <h1 id="namePage" class="font-['Manrope'] font-bold tracking-tight text-1xl text-[#dee5ff]"></h1>
        </div>
        <button class="text-[#90abff] hover:bg-[#0f1930] transition-colors p-2 rounded-lg">
        </button>
    </header>
    <main class="pt-10 px-6 max-w-2xl mx-auto space-y-8">
        <!-- Photo Upload Section -->
        <section class="relative group">
            <div
                class="aspect-square w-full rounded-xl bg-surface-container border border-outline-variant/15 overflow-hidden flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-surface-container-high active:scale-[0.98] duration-200">
                <div id="imgItem" class="absolute inset-0 opacity-[0.3] rounded-[10px] bg-cover bg-center" data-alt="Close up of professional audio mixer knobs and faders in a dark studio setting with neon highlights">
                </div>
                <div class="relative z-10 flex flex-col items-center gap-4">
                    <div
                        class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined !text-4xl" data-icon="photo_camera">photo_camera</span>
                    </div>
                    <div class="text-center">
                        <p class="font-headline font-bold text-on-surface">Upload or Take Photo</p>
                        <p class="text-on-surface-variant text-sm mt-1">RAW, JPG or PNG up to 10MB</p>
                    </div>
                </div>
            </div>
        </section>
        <!-- Equipment Form -->
        <section class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- codigo -->
                <div class="space-y-2">
                    <label
                        class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                        <span class="material-symbols-outlined text-xs" data-icon="label">label</span>
                        PATRIMÔNIO
                    </label>
                    <input id="item-cod"
                        class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all"
                        placeholder="000000" type="text" maxlength="6" required/>
                </div>
            </div>
            <!-- Equipment Name -->
            <div class="space-y-1">
                <label
                    class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                    <span class="material-symbols-outlined text-xs" data-icon="label">label</span>
                    EQUIPMENT NAME
                </label>
                <input id="item-nome"
                    class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all"
                    placeholder="e.g., Shure SM58" type="text" required/>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Brand -->
                <div class="space-y-2">
                    <label
                        class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                        <span class="material-symbols-outlined text-xs" data-icon="copyright">copyright</span>
                        TIPO
                    </label>
                    <select id="item-tipo"
                        class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface appearance-none focus:ring-2 focus:ring-primary/50 transition-all cursor-pointer">

                    </select>
                </div>
                <div class="space-y-2">
                    <label
                        class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                        <span class="material-symbols-outlined text-xs" data-icon="copyright">copyright</span>
                        VOLTAGEM
                    </label>
                    <select id="item-voltagem"
                        class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface appearance-none focus:ring-2 focus:ring-primary/50 transition-all cursor-pointer">
                    </select>
                </div>
            </div>

            <!-- Category -->
            <div class="space-y-2">
                <label
                    class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                    <span class="material-symbols-outlined text-xs" data-icon="category">category</span>
                    CATEGORY
                </label>
                <div class="relative">
                    <select id="item-categoria"
                        class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface appearance-none focus:ring-2 focus:ring-primary/50 transition-all cursor-pointer">

                    </select>
                </div>
            </div>

            <!-- local -->
            <div class="space-y-2">
                <label
                    class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                    <span class="material-symbols-outlined text-xs" data-icon="copyright">copyright</span>
                    LOCAL
                </label>
                <input id="item-local"
                    class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all"
                    placeholder="e.g., Shure" type="text" required/>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Serial Number -->
                <div class="space-y-2">
                    <label
                        class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                        <span class="material-symbols-outlined text-xs" data-icon="tag">tag</span>
                        SERIAL NUMBER (S/N)
                    </label>
                    <input id="item-serial"
                        class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all"
                        placeholder="SN-8293-XXXX" type="text" required/>
                </div>
                <!-- Purchase Date -->
                <div class="space-y-2">
                    <label
                        class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                        <span class="material-symbols-outlined text-xs" data-icon="label">label</span>
                        SITUAÇÃO
                    </label>
                    <select id="item-situacao"
                        class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface appearance-none focus:ring-2 focus:ring-primary/50 transition-all cursor-pointer">

                    </select>
                </div>
            </div>
            <!-- Technical Specifications -->
            <div class="space-y-2">
                <label
                    class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                    <span class="material-symbols-outlined text-xs" data-icon="description">description</span>
                    TECHNICAL SPECIFICATIONS
                </label>
                <textarea id="item-obs"
                    class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all resize-none"
                    placeholder="Frequency range, power consumption, connector types..." rows="4"></textarea>
            </div>
            <!-- Status Toggle -->
            <!-- <div class="space-y-4">
                <label
                    class="font-headline text-sm font-bold tracking-wide text-on-surface-variant flex items-center gap-2">
                    <span class="material-symbols-outlined text-xs" data-icon="check_circle">check_circle</span>
                    INITIAL STATUS
                </label>
                <div class="grid grid-cols-3 p-1 bg-surface-container-low rounded-xl border border-outline-variant/10">
                    <button
                        class="flex items-center justify-center gap-2 py-3 rounded-lg bg-gradient-to-tr from-[#7b9cff] to-[#316bf3] text-white shadow-lg active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-sm" data-icon="check"
                            data-weight="fill">check</span>
                        <span class="text-xs font-bold uppercase tracking-widest">Available</span>
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 py-3 rounded-lg text-on-surface-variant hover:text-on-surface transition-colors active:scale-95">
                        <span class="material-symbols-outlined text-sm" data-icon="build">build</span>
                        <span class="text-xs font-bold uppercase tracking-widest">Maint.</span>
                    </button>
                    <button
                        class="flex items-center justify-center gap-2 py-3 rounded-lg text-on-surface-variant hover:text-on-surface transition-colors active:scale-95">
                        <span class="material-symbols-outlined text-sm" data-icon="sync">sync</span>
                        <span class="text-xs font-bold uppercase tracking-widest">In Use</span>
                    </button>
                </div>
            </div> -->
        </section>
        <!-- Action Buttons -->
        <section class="pt-8 space-y-4">
            <button id="btn-action"
                class="w-full py-5 rounded-full bg-[#316bf3] text-white font-headline font-extrabold text-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined" data-icon="save">save</span>
                <span id="actionCad">Salvar</span>
            </button>
            <button id="btn-cancel"
                class="backBtn w-full py-4 rounded-full bg-surface-variant text-on-surface font-headline font-bold hover:bg-surface-bright active:scale-95 transition-all">
                Cancel
            </button>
        </section>
    </main>
    
    <script type="module" src="js/cadastro.js"></script>
</body>


</html>
